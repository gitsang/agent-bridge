services:
  opencode-connect:
    build:
      context: .
      dockerfile: Containerfile
    container_name: opencode-connect
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./configs/config.container.yaml:/app/configs/config.yaml:ro
    environment:
      OPENCODE_CONNECT_OPENCODE_BASEURL: "http://127.0.0.1:4096"
    command:
      - -c
      - /app/configs/config.yaml
