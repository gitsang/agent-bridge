services:
  agent-bridge:
    image: agent-bridge:local
    build:
      context: .
      dockerfile: Containerfile
    container_name: agent-bridge
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./configs/config.container.yaml:/app/configs/config.yaml:ro
    command:
      - -c
      - /app/configs/config.yaml
