services:
  opencode-connect:
    image: opencode-connect:local
    build:
      context: .
      dockerfile: Containerfile
    container_name: opencode-connect
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./configs/config.container.yaml:/app/configs/config.yaml:ro
    command:
      - -c
      - /app/configs/config.yaml

networks:
  opencode:
    driver: bridge
