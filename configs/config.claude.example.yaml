log:
  handlers:
    default: "default"
  providers:
    default:
      - format: "json"
        level: "debug"
        verbosity: 3
        output:
          stdout:
            enable: true

plugins:
  openai-compatible:
    openai-compatible:
      listen: ":24368"
  ume:
    ume:
      listen: ":24369"
      format: "text" # text | card

agent:
  driver: claude
  message_output:
    include:
      - answer
  claude:
    command: "claude"
    args:
      - "--bare"
      - "-p"
      - "--output-format"
      - "stream-json"
      - "--verbose"
    env: {}
    timeout: 30m

conversation_store:
  type: "memory" # memory | file
  file_path: "data/conversation_store.json"
  ttl: 24h
  max_items: 1024
