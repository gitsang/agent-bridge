log:
  handlers:
    default: "default"
  providers:
    default:
      - format: "json"
        level: "debug"
        verbosity: 3
        output:
          stdout:
            enable: true

plugins:
  openai-compatible:
    openai-compatible:
      listen: ":24368"
  ume:
    ume:
      listen: ":24369"

agent:
  baseurl: "http://127.0.0.1:4096"
  username: ""
  password: ""
  timeout: 0s

conversation_store:
  type: "memory" # memory | file
  file_path: "data/conversation_store.json"
  ttl: 24h
  max_items: 1024
