log:
  handlers:
    default: "default"
  providers:
    default:
      - format: "json"
        level: "debug"
        verbosity: 3
        output:
          stdout:
            enable: true

plugins:
  openai-compatible:
    openai-compatible:
      listen: ":24368"
  ume:
    ume:
      listen: ":24369"
      format: "text" # text | card
  mattermost:
    mattermost:
      mode: "websocket" # webhook | websocket
      command_prefix: "!" # command prefix, default "/"
      webhook:
        listen: ":24370"
        token: "mattermost-token"
        response_url_hosts:
          - "mattermost.example.com"
      websocket:
        server_url: "https://mattermost.example.com"
        ws_url: "wss://mattermost.example.com"
        access_token: "changeit"

# Agent driver configuration
# Supported drivers: opencode, codex, claude
# Switch by changing the driver field below
agent:
  driver: opencode
  message_output:
    include:
      - answer
      # - reasoning
      # - action
      # - artifact
      # - diagnostic
  opencode:
    base_url: "http://127.0.0.1:4096"
    username: ""
    password: ""
    timeout: 10m
    db_path: "/root/.local/share/opencode/opencode.db"
  codex:
    command: "codex"
    args:
      - "app-server"
      - "--listen"
      - "stdio://"
    env: {}
    timeout: 30m
    initialize_timeout: 15s
  claude:
    command: "claude"
    args:
      # - "--bare"
      - "-p"
      - "--output-format"
      - "stream-json"
      - "--verbose"
    env: {}
    timeout: 30m

conversation:
  store:
    type: "sqlite" # memory | file | sqlite
    path: "/tmp/agent-bridge/conversation.db"
    ttl: 24h
    max_items: 1024
  message:
    include_user_identity: false
